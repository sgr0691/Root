name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: root-aarch64-apple-darwin.tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: root-x86_64-apple-darwin.tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: root-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: root-aarch64-unknown-linux-gnu.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation linker (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/root dist/
          cd dist
          tar czf ${{ matrix.archive }} root
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*/*.tar.gz release-assets/
          cp artifacts/*/*.sha256 release-assets/
          cat release-assets/*.sha256 > release-assets/checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
